<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Telegram Reader</title>
        <link rel="manifest" href="manifest.json" />
        <link rel="stylesheet" href="styles.css" />
        <script>
            if ("serviceWorker" in navigator) {
                window.addEventListener("load", () => {
                    navigator.serviceWorker
                        .register("service-worker.js")
                        .then((registration) =>
                            console.log(
                                "Service Worker registered:",
                                registration,
                            ),
                        )
                        .catch((error) =>
                            console.error(
                                "Service Worker registration failed:",
                                error,
                            ),
                        );
                });
            }
        </script>
    </head>
    <body>
        <header>
            <h1>Telegram Reader</h1>
            <p>Enter a Telegram post link to read its content</p>
        </header>

        <div class="reader-container">
            <div class="link-input-group">
                <input
                    type="text"
                    id="telegramLink"
                    placeholder="e.g., https://t.me/korovany/1494"
                />
                <button id="loadButton" onclick="loadTelegramPost()">
                    Load Post
                </button>
            </div>
            <div id="postDisplay" class="post-content">
                <p>
                    Enter a Telegram link above and click "Load Post" to see the
                    content.
                </p>
            </div>
            <p
                id="errorMessage"
                class="error-message"
                style="display: none"
            ></p>
        </div>

        <footer>
            <p>
                Powered by pure JavaScript and modern web technologies • Works
                offline • No server required
            </p>
            <p>
                <a
                    href="index.html"
                    style="color: #007bff; text-decoration: none"
                    >Back to Home</a
                >
            </p>
        </footer>

        <script>
            /**
             * Validates and normalizes Telegram links to embed format
             */
            function normalizeTelegramLink(link) {
                link = link.trim();

                // Match t.me/username/post_id or tg://resolve?domain=username&post=id
                const tmatch = link.match(
                    /(?:https?:\/\/)?t\.me\/([a-zA-Z0-9_]+)\/(\d+)/,
                );
                const tgmatch = link.match(
                    /tg:\/\/resolve\?domain=([a-zA-Z0-9_]+).*post=(\d+)/,
                );

                if (tmatch) {
                    return `https://t.me/${tmatch[1]}/${tmatch[2]}?embed=1`;
                }
                if (tgmatch) {
                    return `https://t.me/${tgmatch[1]}/${tgmatch[2]}?embed=1`;
                }
                return null;
            }

            /**
             * Fetches Telegram post content using AllOrigins CORS proxy
             * and parses the embedded widget HTML.
             */
            async function fetchTelegramPost(link) {
                const embedUrl = normalizeTelegramLink(link);
                if (!embedUrl) {
                    return {
                        error: "Invalid Telegram link. Use format: https://t.me/username/post_id",
                    };
                }

                // Using AllOrigins as a CORS proxy to fetch the HTML
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(embedUrl)}`;

                try {
                    const response = await fetch(proxyUrl);
                    if (!response.ok) throw new Error("Proxy request failed");

                    const data = await response.json();
                    const htmlString = data.contents;

                    // Parse the HTML string into a DOM object
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(htmlString, "text/html");

                    // Extract content from known Telegram widget selectors
                    const messageText = doc.querySelector(
                        ".tgme_widget_message_text",
                    );
                    const authorName = doc.querySelector(
                        ".tgme_widget_message_author .tgme_widget_message_owner_name",
                    );
                    const photo = doc.querySelector(
                        ".tgme_widget_message_photo_wrap",
                    );
                    const video = doc.querySelector(
                        ".tgme_widget_message_video",
                    );

                    if (!messageText && !photo && !video) {
                        return {
                            error: "Could not find post content. Is the link correct and public?",
                        };
                    }

                    // Prepare internal data structure
                    const result = {
                        title: authorName
                            ? authorName.textContent.trim()
                            : "Telegram Post",
                        content: "",
                    };

                    // Add text content if exists
                    if (messageText) {
                        result.content += `<div class="text-block">${messageText.innerHTML}</div>`;
                    }

                    // Add image if exists
                    if (photo) {
                        // Extract background-image URL from style attribute
                        const style = photo.getAttribute("style");
                        const urlMatch = style
                            ? style.match(/url\(['"]?([^'"]+)['"]?\)/)
                            : null;
                        if (urlMatch && urlMatch[1]) {
                            result.content += `<img src="${urlMatch[1]}" alt="Post Image">`;
                        }
                    }

                    return { success: true, data: result };
                } catch (error) {
                    console.error("Fetch error:", error);
                    return {
                        error: "Failed to fetch content. Please check your connection or try again later.",
                    };
                }
            }

            function renderPostContent(postData) {
                const postDisplay = document.getElementById("postDisplay");
                const errorMessage = document.getElementById("errorMessage");

                errorMessage.style.display = "none";

                if (postData.error) {
                    errorMessage.textContent = postData.error;
                    errorMessage.style.display = "block";
                    postDisplay.innerHTML = "";
                    return;
                }

                if (!postData.success || !postData.data) {
                    errorMessage.textContent = "An unexpected error occurred.";
                    errorMessage.style.display = "block";
                    postDisplay.innerHTML = "";
                    return;
                }

                const { title, content } = postData.data;
                postDisplay.innerHTML = `<h2>${title}</h2>${content}`;
            }

            async function loadTelegramPost() {
                const linkInput = document.getElementById("telegramLink");
                const loadButton = document.getElementById("loadButton");
                const telegramLink = linkInput.value.trim();
                const errorMessage = document.getElementById("errorMessage");

                if (!telegramLink) {
                    errorMessage.textContent = "Please enter a Telegram link";
                    errorMessage.style.display = "block";
                    return;
                }

                const normalized = normalizeTelegramLink(telegramLink);
                if (!normalized) {
                    errorMessage.textContent =
                        "Invalid Telegram link. Use format: https://t.me/username/post_id";
                    errorMessage.style.display = "block";
                    return;
                }

                document.getElementById("postDisplay").innerHTML =
                    "<p>Loading from Telegram...</p>";
                errorMessage.style.display = "none";
                loadButton.disabled = true;

                const result = await fetchTelegramPost(normalized);
                renderPostContent(result);

                loadButton.disabled = false;
            }

            // Initial load handling if a link is passed via URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const initialLink = urlParams.get("link");
            if (initialLink) {
                document.getElementById("telegramLink").value = initialLink;
                loadTelegramPost();
            }
        </script>
    </body>
</html>
