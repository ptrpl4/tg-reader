<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>tg-reader</title>
        <link rel="manifest" href="manifest.json" />
        <link rel="stylesheet" href="styles.css" />
        <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self'; connect-src https://api.codetabs.com https://api.allorigins.win https://thingproxy.freeboard.io; img-src https: data:; media-src https:; worker-src 'self'; manifest-src 'self'; base-uri 'self'; form-action 'none';">
        <link rel="preconnect" href="https://api.codetabs.com">
        <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
        <meta name="theme-color" content="#111118" media="(prefers-color-scheme: dark)">
        <script>
            if ("serviceWorker" in navigator) {
                window.addEventListener("load", () => {
                    navigator.serviceWorker
                        .register("service-worker.js")
                        .then((registration) =>
                            console.log(
                                "Service Worker registered:",
                                registration,
                            ),
                        )
                        .catch((error) =>
                            console.error(
                                "Service Worker registration failed:",
                                error,
                            ),
                        );
                });
            }

            // Reader logic from reader.html
            function normalizeTelegramLink(link) {
                link = link.trim();
                const tmatch = link.match(
                    /(?:https?:\/\/)?t\.me\/([a-zA-Z0-9_]+)\/(\d+)/,
                );
                const tgmatch = link.match(
                    /tg:\/\/resolve\?domain=([a-zA-Z0-9_]+).*post=(\d+)/,
                );
                if (tmatch)
                    return `https://t.me/${tmatch[1]}/${tmatch[2]}?embed=1`;
                if (tgmatch)
                    return `https://t.me/${tgmatch[1]}/${tgmatch[2]}?embed=1`;
                return null;
            }

            const defaultTelegramLink = "https://t.me/korovany/1494";
            const POST_CACHE_STORAGE_KEY = "tg-reader-post-cache-v1";
            const THEME_STORAGE_KEY = "tg-reader-theme";
            const READER_PREFS_STORAGE_KEY = "tg-reader-reader-prefs-v1";
            const Theme = {
                LIGHT: "light",
                DARK: "dark",
                AUTO: "auto",
            };
            const ReaderTextSize = {
                SMALL: "small",
                MEDIUM: "medium",
                LARGE: "large",
            };
            let currentChannel = null;
            let currentPostId = null;
            let lastCanonicalLink = null;

            const THEME_ICONS = {
                light: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>`,
                dark: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`,
                auto: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>`,
            };
            const MODE_ICONS = {
                default: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>`,
                minimal: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>`,
            };

            const ICON_EXTERNAL_LINK = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;
            const ICON_ALERT = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
            const ICON_INFO = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>`;

            function getStoredTheme() {
                try {
                    const stored = localStorage.getItem(THEME_STORAGE_KEY);
                    if (
                        stored === Theme.DARK ||
                        stored === Theme.LIGHT ||
                        stored === Theme.AUTO
                    ) {
                        return stored;
                    }
                } catch (error) {
                    console.warn("Unable to read theme preference:", error);
                }
                return null;
            }

            function applyTheme(theme, persist = true) {
                if (!theme) return;
                const prefersDark = window.matchMedia(
                    "(prefers-color-scheme: dark)",
                ).matches;
                const isDark =
                    theme === Theme.DARK ||
                    (theme === Theme.AUTO && prefersDark);
                document.documentElement.dataset.theme = isDark
                    ? Theme.DARK
                    : Theme.LIGHT;
                // Update 3-position pill
                const lightBtn = document.getElementById("themeLightBtn");
                const darkBtn = document.getElementById("themeDarkBtn");
                const autoBtn = document.getElementById("themeAutoBtn");
                if (lightBtn)
                    lightBtn.setAttribute(
                        "aria-pressed",
                        String(theme === Theme.LIGHT),
                    );
                if (darkBtn)
                    darkBtn.setAttribute(
                        "aria-pressed",
                        String(theme === Theme.DARK),
                    );
                if (autoBtn)
                    autoBtn.setAttribute(
                        "aria-pressed",
                        String(theme === Theme.AUTO),
                    );
                // Update mobile cycle button
                const themeCycleBtn = document.getElementById("themeCycleBtn");
                if (themeCycleBtn) {
                    themeCycleBtn.dataset.theme = theme;
                    themeCycleBtn.querySelector(".cycle-btn-icon").innerHTML =
                        THEME_ICONS[theme] ?? THEME_ICONS.auto;
                    themeCycleBtn.setAttribute("aria-label", `Theme: ${theme}`);
                }
                if (persist) {
                    try {
                        localStorage.setItem(THEME_STORAGE_KEY, theme);
                    } catch (error) {
                        console.warn("Unable to persist theme:", error);
                    }
                }
            }

            function initThemeToggle() {
                const storedTheme = getStoredTheme();
                const initialTheme = storedTheme ?? Theme.AUTO;
                applyTheme(initialTheme, Boolean(storedTheme));
                document
                    .getElementById("themeLightBtn")
                    ?.addEventListener("click", () =>
                        applyTheme(Theme.LIGHT, true),
                    );
                document
                    .getElementById("themeDarkBtn")
                    ?.addEventListener("click", () =>
                        applyTheme(Theme.DARK, true),
                    );
                document
                    .getElementById("themeAutoBtn")
                    ?.addEventListener("click", () =>
                        applyTheme(Theme.AUTO, true),
                    );
                // Mobile cycle button — cycles Light → Dark → Auto → Light
                const themeOrder = [Theme.LIGHT, Theme.DARK, Theme.AUTO];
                document
                    .getElementById("themeCycleBtn")
                    ?.addEventListener("click", () => {
                        const current = getStoredTheme() ?? Theme.AUTO;
                        const next =
                            themeOrder[
                                (themeOrder.indexOf(current) + 1) %
                                    themeOrder.length
                            ];
                        applyTheme(next, true);
                    });
                // Sync when system preference changes (active when auto is selected)
                window
                    .matchMedia("(prefers-color-scheme: dark)")
                    .addEventListener("change", () => {
                        const stored = getStoredTheme();
                        if (!stored || stored === Theme.AUTO) {
                            applyTheme(Theme.AUTO, Boolean(stored));
                        }
                    });
            }

            function normalizeReaderPreferences(raw) {
                const textSizeValues = Object.values(ReaderTextSize);
                const textSize = textSizeValues.includes(raw?.textSize)
                    ? raw.textSize
                    : ReaderTextSize.MEDIUM;
                const minimal = Boolean(raw?.minimal);
                return { textSize, minimal };
            }

            function getStoredReaderPreferences() {
                try {
                    const stored = localStorage.getItem(READER_PREFS_STORAGE_KEY);
                    if (!stored) return null;
                    return normalizeReaderPreferences(JSON.parse(stored));
                } catch (error) {
                    console.warn("Unable to read reader preferences:", error);
                    return null;
                }
            }

            function applyReaderPreferences(preferences, persist = true) {
                const normalized = normalizeReaderPreferences(preferences);
                document.documentElement.dataset.readerTextSize =
                    normalized.textSize;
                document.documentElement.dataset.readerMinimal = String(
                    normalized.minimal,
                );

                const textSizeSelect = document.getElementById("textSizeSelect");
                if (textSizeSelect) textSizeSelect.value = normalized.textSize;
                // Update mode pill
                document
                    .getElementById("modeDefaultBtn")
                    ?.setAttribute("aria-pressed", String(!normalized.minimal));
                document
                    .getElementById("modeMinimalBtn")
                    ?.setAttribute("aria-pressed", String(normalized.minimal));
                // Update mobile cycle button
                const modeCycleBtn = document.getElementById("modeCycleBtn");
                if (modeCycleBtn) {
                    const modeKey = normalized.minimal ? "minimal" : "default";
                    modeCycleBtn.dataset.mode = modeKey;
                    modeCycleBtn.querySelector(".cycle-btn-icon").innerHTML =
                        MODE_ICONS[modeKey];
                    modeCycleBtn.setAttribute(
                        "aria-label",
                        `Reading mode: ${modeKey}`,
                    );
                }

                if (persist) {
                    try {
                        localStorage.setItem(
                            READER_PREFS_STORAGE_KEY,
                            JSON.stringify(normalized),
                        );
                    } catch (error) {
                        console.warn(
                            "Unable to persist reader preferences:",
                            error,
                        );
                    }
                }
            }

            function initReaderTools() {
                const stored = getStoredReaderPreferences();
                applyReaderPreferences(
                    stored ?? { textSize: ReaderTextSize.MEDIUM, minimal: false },
                    false,
                );

                document
                    .getElementById("textSizeSelect")
                    ?.addEventListener("change", (event) => {
                        applyReaderPreferences(
                            {
                                textSize: event.target.value,
                                minimal:
                                    document.documentElement.dataset
                                        .readerMinimal === "true",
                            },
                            true,
                        );
                    });
                // Mode pill buttons
                document
                    .getElementById("modeDefaultBtn")
                    ?.addEventListener("click", () => {
                        applyReaderPreferences(
                            {
                                textSize:
                                    document.documentElement.dataset
                                        .readerTextSize,
                                minimal: false,
                            },
                            true,
                        );
                    });
                document
                    .getElementById("modeMinimalBtn")
                    ?.addEventListener("click", () => {
                        applyReaderPreferences(
                            {
                                textSize:
                                    document.documentElement.dataset
                                        .readerTextSize,
                                minimal: true,
                            },
                            true,
                        );
                    });
                // Mobile cycle button — toggles Default ↔ Minimal
                document
                    .getElementById("modeCycleBtn")
                    ?.addEventListener("click", () => {
                        const isMinimal =
                            document.documentElement.dataset.readerMinimal ===
                            "true";
                        applyReaderPreferences(
                            {
                                textSize:
                                    document.documentElement.dataset
                                        .readerTextSize,
                                minimal: !isMinimal,
                            },
                            true,
                        );
                    });
                window.addEventListener("keydown", (event) => {
                    if (event.defaultPrevented) return;
                    if (event.key.toLowerCase() !== "m") return;
                    const target = event.target;
                    const isTypingContext =
                        target instanceof HTMLElement &&
                        (target.tagName === "INPUT" ||
                            target.tagName === "TEXTAREA" ||
                            target.tagName === "SELECT" ||
                            target.isContentEditable);
                    if (isTypingContext) return;
                    applyReaderPreferences(
                        {
                            textSize:
                                document.documentElement.dataset.readerTextSize,
                            minimal:
                                document.documentElement.dataset.readerMinimal !==
                                "true",
                        },
                        true,
                    );
                });
            }

            const allowedTags = new Set([
                "a",
                "b",
                "strong",
                "em",
                "i",
                "u",
                "span",
                "p",
                "div",
                "br",
                "code",
                "pre",
            ]);

            function escapeHtml(value) {
                if (!value) return "";
                return value
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            }

            function sanitizeUrl(value) {
                if (!value) return null;
                let href = value.trim();
                if (href.startsWith("//")) {
                    href = `https:${href}`;
                }
                try {
                    const url = new URL(href);
                    if (!["http:", "https:", "tg:"].includes(url.protocol)) {
                        return null;
                    }
                } catch {
                    return null;
                }
                return href;
            }

            function decodeLinkText(value) {
                try {
                    return decodeURIComponent(value);
                } catch {
                    return value;
                }
            }

            function sanitizeMessageHtml(element) {
                if (!element) return "";
                const fragment = document.createElement("div");
                fragment.appendChild(element.cloneNode(true));
                const cleanNode = (node) => {
                    if (node.nodeType === Node.TEXT_NODE) {
                        return escapeHtml(node.textContent);
                    }
                    if (node.nodeType !== Node.ELEMENT_NODE) {
                        return "";
                    }
                    const tag = node.tagName.toLowerCase();
                    if (!allowedTags.has(tag)) {
                        return Array.from(node.childNodes)
                            .map(cleanNode)
                            .join("");
                    }
                    const inner = Array.from(node.childNodes)
                        .map(cleanNode)
                        .join("");
                    if (tag === "br") {
                        return "<br />";
                    }
                    if (tag === "a") {
                        const href = sanitizeUrl(node.getAttribute("href"));
                        if (!href) {
                            return inner;
                        }
                        const display =
                            inner.trim() ||
                            escapeHtml(
                                decodeLinkText(href.replace(/https?:\/\//, "")),
                            );
                        return `<a href="${href}" target="_blank" rel="noreferrer">${display}</a>`;
                    }
                    return `<${tag}>${inner}</${tag}>`;
                };
                return Array.from(fragment.childNodes).map(cleanNode).join("");
            }

            function buildCacheKey(channel, postId) {
                return `${channel}/${postId}`;
            }

            const proxyServices = [
                {
                    name: "CodeTabs",
                    buildUrl: (target) =>
                        `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(
                            target,
                        )}`,
                },
                {
                    name: "AllOrigins",
                    buildUrl: (target) =>
                        `https://api.allorigins.win/raw?url=${encodeURIComponent(
                            target,
                        )}`,
                },
                {
                    name: "ThingProxy",
                    buildUrl: (target) =>
                        `https://thingproxy.freeboard.io/fetch/${encodeURIComponent(
                            target,
                        )}`,
                },
            ];

            let activeAbortController = null;
            let fallbackTimer = null;
            let countdownInterval = null;
            let countdownRemaining = 0;
            let loaderOverlayEl = null;
            let loaderMessageEl = null;
            let countdownEl = null;
            let floatingControlsEl = null;
            let footerEl = null;
            let floatingControlsFrameId = null;
            const MOBILE_FLOATING_CONTROLS_QUERY = "(max-width: 960px)";

            function ensureLoaderElements() {
                if (loaderOverlayEl) return;
                loaderOverlayEl = document.getElementById("loadingOverlay");
                loaderMessageEl = document.getElementById("loaderMessage");
                countdownEl = document.getElementById("fallbackCountdown");
            }

            function ensureFloatingControls() {
                if (floatingControlsEl) return;
                floatingControlsEl =
                    document.querySelector(".floating-controls");
            }

            function ensureFooterElement() {
                if (footerEl) return;
                footerEl = document.querySelector("footer");
            }

            function updateFloatingControlsOffset() {
                ensureFloatingControls();
                ensureFooterElement();
                if (!floatingControlsEl) return;
                if (!window.matchMedia(MOBILE_FLOATING_CONTROLS_QUERY).matches) {
                    floatingControlsEl.style.bottom = "";
                    return;
                }
                if (
                    !floatingControlsEl.classList.contains(
                        "floating-controls--visible",
                    )
                ) {
                    floatingControlsEl.style.bottom = "";
                    return;
                }
                const baseBottom = 0;
                const footerGap = 0;
                const footerRect = footerEl?.getBoundingClientRect();
                if (!footerRect) {
                    floatingControlsEl.style.bottom = `calc(${baseBottom}px + env(safe-area-inset-bottom, 0px))`;
                    return;
                }
                const overlap = Math.max(
                    window.innerHeight - footerRect.top + footerGap,
                    0,
                );
                floatingControlsEl.style.bottom = `calc(${baseBottom + overlap}px + env(safe-area-inset-bottom, 0px))`;
            }

            function scheduleFloatingControlsOffsetUpdate() {
                if (floatingControlsFrameId !== null) return;
                floatingControlsFrameId = window.requestAnimationFrame(() => {
                    floatingControlsFrameId = null;
                    updateFloatingControlsOffset();
                });
            }

            function setFloatingControlsVisibility(visible) {
                ensureFloatingControls();
                const isVisible = Boolean(visible);
                floatingControlsEl?.classList.toggle(
                    "floating-controls--visible",
                    isVisible,
                );
                floatingControlsEl?.setAttribute(
                    "aria-hidden",
                    isVisible ? "false" : "true",
                );
                scheduleFloatingControlsOffsetUpdate();
            }

            function updateCountdownText(nextServiceName) {
                ensureLoaderElements();
                if (!countdownEl) return;
                if (!nextServiceName) {
                    countdownEl.textContent = "Waiting for response…";
                    return;
                }
                countdownEl.textContent = `Switching to ${nextServiceName} in ${countdownRemaining}s`;
            }

            function clearFallbackTimers() {
                clearTimeout(fallbackTimer);
                clearInterval(countdownInterval);
                fallbackTimer = null;
                countdownInterval = null;
            }

            function showLoadingOverlay(serviceName, nextServiceName) {
                ensureLoaderElements();
                if (!loaderOverlayEl) return;
                loaderOverlayEl.classList.add("active");
                if (loaderMessageEl) {
                    loaderMessageEl.textContent = `Loading via ${serviceName}…`;
                }
                countdownRemaining = 3;
                updateCountdownText(nextServiceName);
                clearFallbackTimers();
                const upcoming = nextServiceName;
                countdownInterval = setInterval(() => {
                    countdownRemaining = Math.max(countdownRemaining - 1, 0);
                    updateCountdownText(upcoming);
                }, 1000);
                fallbackTimer = setTimeout(() => {
                    if (!upcoming) {
                        updateCountdownText(null);
                        return;
                    }
                    if (loaderMessageEl) {
                        loaderMessageEl.textContent = `No response from ${serviceName}; switching to ${upcoming}…`;
                    }
                    activeAbortController?.abort();
                }, 3000);
            }

            function stopLoadingOverlay() {
                ensureLoaderElements();
                clearFallbackTimers();
                if (loaderOverlayEl) {
                    loaderOverlayEl.classList.remove("active");
                }
            }

            function readPostCache(channel, postId) {
                if (!channel || !postId) return null;
                try {
                    const stored = localStorage.getItem(POST_CACHE_STORAGE_KEY);
                    if (!stored) return null;
                    const parsed = JSON.parse(stored);
                    return parsed[buildCacheKey(channel, postId)] ?? null;
                } catch (error) {
                    console.warn("Unable to read post cache:", error);
                    return null;
                }
            }

            const POST_CACHE_MAX_ENTRIES = 50;

            function evictPostCache(cache) {
                const keys = Object.keys(cache);
                if (keys.length <= POST_CACHE_MAX_ENTRIES) return cache;
                keys.sort(
                    (a, b) =>
                        (cache[a].lastOpened ?? 0) - (cache[b].lastOpened ?? 0),
                );
                const evict = keys.slice(
                    0,
                    keys.length - POST_CACHE_MAX_ENTRIES,
                );
                const pruned = { ...cache };
                for (const k of evict) delete pruned[k];
                return pruned;
            }

            function persistPostCache(channel, postId, data, options = {}) {
                if (!channel || !postId) return;
                try {
                    const stored = localStorage.getItem(POST_CACHE_STORAGE_KEY);
                    let cache = stored ? JSON.parse(stored) : {};
                    const key = buildCacheKey(channel, postId);
                    const existing = cache[key] ?? {};
                    cache[key] = {
                        data,
                        cachedAt:
                            options.cachedAt ?? existing.cachedAt ?? Date.now(),
                        lastOpened: options.lastOpened ?? Date.now(),
                    };
                    cache = evictPostCache(cache);
                    localStorage.setItem(
                        POST_CACHE_STORAGE_KEY,
                        JSON.stringify(cache),
                    );
                } catch (error) {
                    console.warn("Unable to persist post cache:", error);
                }
            }

            async function fetchTelegramPost(link, { showLoader = true } = {}) {
                try {
                    return await tryFetchWithService(link, 0, { showLoader });
                } catch (error) {
                    stopLoadingOverlay();
                    console.error("Proxy chain failed:", error);
                    if (error.httpStatus >= 400) {
                        return {
                            error: `Proxy services returned an error (HTTP ${error.httpStatus}). The post may be unavailable or the service is rate-limited — try again later.`,
                        };
                    }
                    return {
                        error: "Unable to reach any proxy service. Check your connection and try again.",
                    };
                }
            }

            async function tryFetchWithService(
                link,
                index,
                { showLoader = true } = {},
            ) {
                if (index >= proxyServices.length) {
                    throw new Error("All proxy services failed");
                }
                const service = proxyServices[index];
                if (showLoader) {
                    showLoadingOverlay(
                        service.name,
                        proxyServices[index + 1]?.name ?? null,
                    );
                } else {
                    clearFallbackTimers();
                }
                const controller = new AbortController();
                activeAbortController = controller;
                try {
                    const response = await fetch(service.buildUrl(link), {
                        signal: controller.signal,
                    });
                    if (!response.ok) {
                        const err = new Error(
                            `${service.name} returned ${response.status}`,
                        );
                        err.httpStatus = response.status;
                        throw err;
                    }
                    const htmlString = await response.text();
                    if (showLoader) {
                        stopLoadingOverlay();
                    }
                    return parsePostContent(htmlString);
                } catch (error) {
                    if (showLoader) {
                        clearFallbackTimers();
                    }
                    if (controller.signal.aborted) {
                        if (index + 1 < proxyServices.length) {
                            return tryFetchWithService(link, index + 1, {
                                showLoader,
                            });
                        }
                        throw new Error("Proxy chain aborted");
                    }
                    if (index + 1 < proxyServices.length) {
                        return tryFetchWithService(link, index + 1, {
                            showLoader,
                        });
                    }
                    throw error;
                }
            }

            function updatePostFooter(channel, postId, canonicalLink) {
                const footer = document.getElementById("postFooter");
                if (!footer) return;
                const cached = readPostCache(channel, postId);
                let infoHtml = "";
                if (cached) {
                    const lastOpened =
                        cached.lastOpened ?? cached.cachedAt ?? Date.now();
                    infoHtml += `<div class="post-footer__info">Last opened ${new Date(lastOpened).toLocaleString()}</div>`;
                    const cachedAt = cached.cachedAt ?? lastOpened;
                    if (cachedAt && cachedAt !== lastOpened) {
                        infoHtml += `<div class="post-footer__info">Cached ${new Date(cachedAt).toLocaleString()}</div>`;
                    }
                }
                let linksHtml = "";
                if (canonicalLink) {
                    linksHtml += `<a class="post-footer__link" href="${escapeHtml(canonicalLink)}" target="_blank" rel="noreferrer">Open original ${ICON_EXTERNAL_LINK}</a>`;
                }
                if (channel && postId) {
                    const commentsUrl = `https://t.me/${escapeHtml(channel)}/${postId}?comment=1`;
                    linksHtml += `<a class="post-footer__link" href="${commentsUrl}" target="_blank" rel="noreferrer">Open comments ${ICON_EXTERNAL_LINK}</a>`;
                }
                footer.innerHTML = `
                    ${infoHtml}
                    ${linksHtml ? `<div class="post-footer__link-wrap">${linksHtml}</div>` : ""}
                `;
            }

            function setStatusMessage(text = "", variant = "error") {
                const statusEl = document.getElementById("errorMessage");
                if (!statusEl) return;
                if (!text) {
                    statusEl.innerHTML = "";
                    statusEl.classList.remove("info", "error");
                    statusEl.style.display = "none";
                    return;
                }
                if (variant === "info") {
                    statusEl.innerHTML = `<div class="status-icon">${ICON_INFO}</div><span>${text}</span>`;
                } else {
                    statusEl.innerHTML = `<div class="status-icon">${ICON_ALERT}</div><p>${text}</p>`;
                }
                statusEl.classList.toggle("info", variant === "info");
                statusEl.classList.toggle("error", variant !== "info");
                statusEl.style.display = variant === "info" ? "flex" : "block";
            }

            function updateHistory(channel, postId, replace = false) {
                const params = new URLSearchParams();
                if (channel) params.set("channel", channel);
                if (postId) params.set("post", postId);
                const query = params.toString();
                const url = query
                    ? `${window.location.pathname}?${query}`
                    : window.location.pathname;
                const state = { channel, postId };
                if (replace) {
                    window.history.replaceState(state, "", url);
                } else {
                    window.history.pushState(state, "", url);
                }
            }

            function parseTelegramLink(link) {
                if (!link) return null;
                const clean = link.split("?")[0];
                const match = clean.match(/t\.me\/([a-zA-Z0-9_]+)\/(\d+)/);
                if (!match) {
                    return null;
                }
                return {
                    channel: match[1],
                    postId: Number(match[2]),
                    cleanLink: clean,
                };
            }

            function updatePostMeta(normalizedLink, data) {
                const metaEl = document.getElementById("postMeta");
                if (!normalizedLink) {
                    metaEl.innerHTML = "";
                    currentChannel = null;
                    currentPostId = null;
                    setNavigationButtonsState();
                    return;
                }
                const parsed = parseTelegramLink(normalizedLink);
                if (!parsed) {
                    metaEl.innerHTML = "";
                    setNavigationButtonsState();
                    return;
                }
                currentChannel = parsed.channel;
                currentPostId = parsed.postId;
                const channelTitle = escapeHtml(data?.title ?? "Telegram Post");
                const sublineParts = [];
                if (parsed.postId) {
                    sublineParts.push(`#${parsed.postId}`);
                }
                if (data?.publishedAtLabel) {
                    sublineParts.push(data.publishedAtLabel);
                }
                metaEl.innerHTML = `
                    <div class="post-meta__left">
                        <p class="post-meta__left-title">${channelTitle}</p>
                        ${
                            sublineParts.length
                                ? `<p class="post-meta__left-subline">${sublineParts.join(
                                      " \u2014 ",
                                  )}</p>`
                                : ""
                        }
                    </div>
                `;
                setNavigationButtonsState();
            }

            function setNavigationButtonsState() {
                const firstBtn = document.getElementById("firstPostBtn");
                const prevBtn = document.getElementById("prevPostBtn");
                const nextBtn = document.getElementById("nextPostBtn");
                const edgePrev = document.getElementById("edgePrevZone");
                const edgeNext = document.getElementById("edgeNextZone");
                if (!firstBtn || !prevBtn || !nextBtn) {
                    return;
                }
                const hasChannel = Boolean(currentChannel && currentPostId);
                firstBtn.disabled = !hasChannel || currentPostId <= 1;
                prevBtn.disabled = !hasChannel || currentPostId <= 1;
                nextBtn.disabled = !hasChannel;
                if (edgePrev) {
                    edgePrev.disabled = !hasChannel || currentPostId <= 1;
                }
                if (edgeNext) {
                    edgeNext.disabled = !hasChannel;
                }
            }

            function goToAdjacentPost(delta) {
                if (!currentChannel || !currentPostId) return;
                const targetId = currentPostId + delta;
                if (targetId < 1) return;
                showReader(`https://t.me/${currentChannel}/${targetId}`);
            }

            function parsePostContent(htmlString) {
                try {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(htmlString, "text/html");
                    const messageText = Array.from(
                        doc.querySelectorAll(".tgme_widget_message_text"),
                    ).find((el) => !el.closest(".tgme_widget_message_reply"));
                    const authorName = doc.querySelector(
                        ".tgme_widget_message_author .tgme_widget_message_owner_name",
                    );
                    const photo = doc.querySelector(
                        ".tgme_widget_message_photo_wrap",
                    );
                    const video = doc.querySelector(
                        ".tgme_widget_message_video",
                    );
                    if (!messageText && !photo && !video) {
                        return {
                            error: "No content found. The post may be private, deleted, or unavailable.",
                        };
                    }
                    const result = {
                        title: authorName
                            ? authorName.textContent.trim()
                            : "Telegram Post",
                        content: "",
                    };
                    const dateNode = doc.querySelector(
                        ".tgme_widget_message_date time",
                    );
                    if (dateNode && dateNode.getAttribute("datetime")) {
                        const publishedDate = new Date(
                            dateNode.getAttribute("datetime"),
                        );
                        result.publishedAtLabel = publishedDate.toLocaleString(
                            undefined,
                            {
                                year: "numeric",
                                month: "short",
                                day: "numeric",
                                hour: "2-digit",
                                minute: "2-digit",
                            },
                        );
                    }
                    if (messageText) {
                        const safeHtml =
                            sanitizeMessageHtml(messageText).trim();
                        if (safeHtml) {
                            result.content += `<div class="text-block">${safeHtml}</div>`;
                        }
                    }
                    const replyBlock = doc.querySelector(
                        ".tgme_widget_message_reply",
                    );
                    if (replyBlock) {
                        const replyTextEl = replyBlock.querySelector(
                            ".js-message_reply_text, .tgme_widget_message_text",
                        );
                        const replyLinkEl =
                            replyBlock.querySelector("a[href*='t.me/']");
                        const replyAuthor =
                            replyBlock
                                .querySelector(
                                    ".tgme_widget_message_owner_name, .tgme_widget_message_author",
                                )
                                ?.textContent.trim() ?? null;
                        const replyLink = replyLinkEl
                            ? replyLinkEl.href.split("?")[0]
                            : null;
                        const parsedReplyLink = replyLink
                            ? parseTelegramLink(replyLink)
                            : null;
                        if (replyTextEl) {
                            const replyHtml =
                                sanitizeMessageHtml(replyTextEl).trim();
                            const replyText = escapeHtml(
                                replyTextEl.textContent,
                            ).trim();
                            const replyBody = replyHtml || replyText;
                            if (replyBody) {
                                result.reply = {
                                    html: replyBody,
                                    text: replyText || replyBody,
                                    author: replyAuthor,
                                    link: replyLink,
                                    channel: parsedReplyLink?.channel ?? null,
                                    postId: parsedReplyLink?.postId ?? null,
                                };
                            }
                        }
                    }
                    if (photo) {
                        const style = photo.getAttribute("style");
                        const urlMatch = style
                            ? style.match(/url\(['"]?([^'"]+)['"]?\)/)
                            : null;
                        const imgSrc = urlMatch ? sanitizeUrl(urlMatch[1]) : null;
                        if (imgSrc) {
                            result.content += `<img src="${escapeHtml(imgSrc)}" alt="Post image" loading="lazy">`;
                        }
                    }
                    if (video) {
                        const videoTag = video.querySelector("video");
                        const videoSrc = videoTag ? sanitizeUrl(videoTag.src) : null;
                        if (videoSrc) {
                            result.content += `<video controls src="${escapeHtml(videoSrc)}"></video>`;
                        }
                    }
                    return { success: true, data: result };
                } catch (parseError) {
                    console.error("Parse error:", parseError);
                    return { error: "Failed to parse post content." };
                }
            }

            function buildReplySection(reply) {
                const replyBody =
                    reply?.html ?? (reply?.text ? escapeHtml(reply.text) : "");
                if (!replyBody) {
                    return "";
                }
                const metaParts = [];
                if (reply.author) metaParts.push(escapeHtml(reply.author));
                else if (reply.channel) metaParts.push(`@${reply.channel}`);
                else metaParts.push("original message");
                if (reply.postId) metaParts.push(`#${reply.postId}`);
                const metaText = metaParts.join(" ");
                const safeReplyLink = reply.link ? sanitizeUrl(reply.link) : null;
                const linkHtml = safeReplyLink
                    ? `<a href="${escapeHtml(safeReplyLink)}" target="_blank" rel="noreferrer">View original</a>`
                    : "";
                return `
                    <div class="reply-banner">
                        <div class="reply-banner__meta">
                            Replying to <strong>${metaText}</strong>
                            ${linkHtml ? `• ${linkHtml}` : ""}
                        </div>
                        <div class="reply-banner__text">${replyBody}</div>
                    </div>
                `;
            }

            function renderPostContent(
                postData,
                normalizedLink,
                { overrideStatusText = null, statusVariant = "error" } = {},
            ) {
                const canonicalLink = normalizedLink ?? lastCanonicalLink;
                const parsed = parseTelegramLink(canonicalLink);
                const statusText =
                    overrideStatusText ??
                    (postData.error ? postData.error : null);
                const variant =
                    overrideStatusText !== null ? statusVariant : "error";
                setStatusMessage(statusText, variant);
                const openLink = parsed?.cleanLink ?? canonicalLink ?? null;
                if (!postData.success || !postData.data) {
                    document.getElementById("postBody").innerHTML = "";
                    updatePostMeta(canonicalLink, null);
                    updatePostFooter(
                        parsed?.channel ?? null,
                        parsed?.postId ?? null,
                        openLink,
                    );
                    return;
                }
                const { content } = postData.data;
                const replySection = buildReplySection(postData.data.reply);
                document.getElementById("postBody").innerHTML = `
                    ${replySection}
                    ${content}
                `;
                updatePostMeta(canonicalLink, postData.data);
                updatePostFooter(
                    parsed?.channel ?? null,
                    parsed?.postId ?? null,
                    openLink,
                );
            }

            async function loadTelegramPost(
                linkOverride = null,
                options = { updateHistory: false, replaceHistory: false },
            ) {
                const linkInput = document.getElementById("telegramLink");
                const loadButton = document.getElementById("loadButton");
                const rawLink = (linkOverride ?? linkInput.value).trim();
                if (!rawLink) {
                    setStatusMessage("Please enter a Telegram link");
                    return;
                }
                const normalized = normalizeTelegramLink(rawLink);
                if (!normalized) {
                    setStatusMessage(
                        "Invalid Telegram link. Use format: https://t.me/username/post_id",
                    );
                    return;
                }
                const parsed = parseTelegramLink(normalized);
                const canonicalLink = parsed?.cleanLink ?? normalized;
                activeAbortController?.abort();
                activeAbortController = null;
                lastCanonicalLink = canonicalLink;
                if (linkOverride) {
                    linkInput.value = parsed?.cleanLink ?? linkOverride;
                }
                if (options.updateHistory && parsed) {
                    updateHistory(
                        parsed.channel,
                        parsed.postId,
                        options.replaceHistory,
                    );
                }
                document.getElementById("postBody").innerHTML =
                    "<p>Loading from Telegram...</p>";
                updatePostMeta(canonicalLink, null);
                setStatusMessage();
                let cachedEntry = null;
                if (parsed) {
                    cachedEntry = readPostCache(parsed.channel, parsed.postId);
                    if (cachedEntry) {
                        const cachedAt =
                            cachedEntry.cachedAt ??
                            cachedEntry.lastOpened ??
                            Date.now();
                        const formatted = new Date(cachedAt).toLocaleString();
                        renderPostContent(
                            { success: true, data: cachedEntry.data },
                            canonicalLink,
                            {
                                overrideStatusText: `Showing cached copy from ${formatted} while refreshing…`,
                                statusVariant: "info",
                            },
                        );
                    }
                }
                loadButton.disabled = true;
                const shouldShowLoader = !cachedEntry;
                const result = await fetchTelegramPost(normalized, {
                    showLoader: shouldShowLoader,
                });
                if (parsed && !result.success) {
                    const cached = readPostCache(parsed.channel, parsed.postId);
                    if (cached) {
                        persistPostCache(
                            parsed.channel,
                            parsed.postId,
                            cached.data,
                            {
                                cachedAt: cached.cachedAt,
                            },
                        );
                        const cachedAt =
                            cached.cachedAt ?? cached.lastOpened ?? Date.now();
                        const formattedCached = new Date(
                            cachedAt,
                        ).toLocaleString();
                        renderPostContent(
                            { success: true, data: cached.data },
                            canonicalLink,
                            {
                                overrideStatusText: `Unable to fetch latest version; showing saved copy from ${formattedCached}.`,
                                statusVariant: "info",
                            },
                        );
                        loadButton.disabled = false;
                        return;
                    }
                }
                if (parsed && result.success) {
                    persistPostCache(
                        parsed.channel,
                        parsed.postId,
                        result.data,
                    );
                }
                renderPostContent(result, canonicalLink);
                loadButton.disabled = false;
            }

            function showHero({
                pushHistory = true,
                replaceHistory = false,
            } = {}) {
                document.querySelector(".hero").classList.remove("hidden");
                document.querySelector(".reader-container").classList.add("hidden");
                document.getElementById("modePill")?.classList.add("hidden");
                document.getElementById("modeCycleBtn")?.classList.add("hidden");
                document.getElementById("postBody").innerHTML =
                    `<p>Enter a Telegram link above and click "Load Post" to see the content.</p>`;
                updatePostMeta(null, null);
                setStatusMessage();
                updatePostFooter(null, null, null);
                document.getElementById("telegramLink").value = "";
                lastCanonicalLink = null;
                setFloatingControlsVisibility(false);
                document.getElementById("homeLink")?.focus();
                if (pushHistory || replaceHistory) {
                    updateHistory(null, null, replaceHistory);
                }
            }

            function showReader(
                link,
                { pushHistory = true, replaceHistory = false } = {},
            ) {
                const heroEl = document.querySelector(".hero");
                const readerEl = document.querySelector(".reader-container");
                const switchingFromHero = !heroEl.classList.contains("hidden");
                heroEl.classList.add("hidden");
                readerEl.classList.remove("hidden");
                document.getElementById("modePill")?.classList.remove("hidden");
                document.getElementById("modeCycleBtn")?.classList.remove("hidden");
                setFloatingControlsVisibility(true);
                if (switchingFromHero) {
                    document.getElementById("telegramLink")?.focus();
                }
                if (link) {
                    document.getElementById("telegramLink").value = link;
                    loadTelegramPost(link, {
                        updateHistory: pushHistory || replaceHistory,
                        replaceHistory,
                    });
                } else {
                    document.getElementById("postBody").innerHTML =
                        `<p>Enter a Telegram link above and click "Load Post" to see the content.</p>`;
                    updatePostMeta(null, null);
                    setStatusMessage();
                    updatePostFooter(null, null, null);
                    document.getElementById("telegramLink").value = "";
                    lastCanonicalLink = null;
                }
            }

            window.addEventListener("DOMContentLoaded", () => {
                const urlParams = new URLSearchParams(window.location.search);
                let initialLink = null;
                const paramChannel = urlParams.get("channel");
                const paramPost = urlParams.get("post");
                if (paramChannel && paramPost) {
                    initialLink = `https://t.me/${paramChannel}/${paramPost}`;
                } else {
                    const legacyLink = urlParams.get("link");
                    if (legacyLink) {
                        const normalized = normalizeTelegramLink(legacyLink);
                        if (normalized) {
                            const parsed = parseTelegramLink(normalized);
                            if (parsed) {
                                initialLink = `https://t.me/${parsed.channel}/${parsed.postId}`;
                            }
                        }
                    }
                }
                if (initialLink) {
                    document.getElementById("homeLink").value = initialLink;
                    showReader(initialLink, {
                        pushHistory: false,
                        replaceHistory: true,
                    });
                } else {
                    showHero({ pushHistory: false, replaceHistory: true });
                }
                document.getElementById("goToReaderBtn").onclick = () => {
                    const rawLink = document
                        .getElementById("homeLink")
                        .value.trim();
                    const link = rawLink || defaultTelegramLink;
                    showReader(link);
                };
                document.getElementById("loadButton").onclick = () =>
                    loadTelegramPost(null, { updateHistory: true });
                document.getElementById("nextPostBtn").onclick = () =>
                    goToAdjacentPost(1);
                document.getElementById("prevPostBtn").onclick = () =>
                    goToAdjacentPost(-1);
                document.getElementById("edgeNextZone").onclick = () =>
                    goToAdjacentPost(1);
                document.getElementById("edgePrevZone").onclick = () =>
                    goToAdjacentPost(-1);
                document.getElementById("firstPostBtn").onclick = () => {
                    if (!currentChannel) return;
                    showReader(`https://t.me/${currentChannel}/1`);
                };
                const headerLinkEl = document.getElementById("headerLink");
                headerLinkEl?.addEventListener("click", (event) => {
                    event.preventDefault();
                    showHero({ pushHistory: true, replaceHistory: true });
                });
                initThemeToggle();
                initReaderTools();
                setNavigationButtonsState();
                window.addEventListener("popstate", (event) => {
                    const channel = event.state?.channel;
                    const postId = event.state?.postId;
                    if (channel && postId) {
                        showReader(`https://t.me/${channel}/${postId}`, {
                            pushHistory: false,
                            replaceHistory: false,
                        });
                        return;
                    }
                    const params = new URLSearchParams(window.location.search);
                    const paramChannel = params.get("channel");
                    const paramPost = params.get("post");
                    if (paramChannel && paramPost) {
                        showReader(
                            `https://t.me/${paramChannel}/${paramPost}`,
                            { pushHistory: false, replaceHistory: false },
                        );
                        return;
                    }
                    showHero({ pushHistory: false, replaceHistory: false });
                });
                window.addEventListener(
                    "scroll",
                    scheduleFloatingControlsOffsetUpdate,
                    { passive: true },
                );
                window.addEventListener(
                    "resize",
                    scheduleFloatingControlsOffsetUpdate,
                );
                const mobileControlsMediaQuery = window.matchMedia(
                    MOBILE_FLOATING_CONTROLS_QUERY,
                );
                mobileControlsMediaQuery.addEventListener(
                    "change",
                    scheduleFloatingControlsOffsetUpdate,
                );
                scheduleFloatingControlsOffsetUpdate();
            });
        </script>
    </head>
    <body>

                <div class="header-actions">

                        </button>

                        </button>
                        <button class="theme-pill-btn" id="themeAutoBtn" type="button" aria-label="System theme" aria-pressed="false">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                        </button>
                    </div>
                    <!-- Mobile cycle buttons (visible < 743px only) -->
                    <button class="cycle-btn mode-cycle-btn hidden" id="modeCycleBtn" type="button" aria-label="Reading mode: default" data-mode="default">
                        <span class="cycle-btn-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg></span>
                        <div class="cycle-pips" aria-hidden="true">
                            <span class="pip"></span>
                            <span class="pip"></span>
                        </div>
                    </button>
                    <button class="cycle-btn theme-cycle-btn" id="themeCycleBtn" type="button" aria-label="Theme: auto" data-theme="auto">
                        <span class="cycle-btn-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></span>
                        <div class="cycle-pips" aria-hidden="true">
                            <span class="pip"></span>
                            <span class="pip"></span>
                            <span class="pip"></span>
                        </div>
                    </button>
                    <button class="user-menu-btn" id="userMenuBtn" type="button" aria-label="User menu">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </button>
                </div>
            </div>
        </header>
        <section class="hero" aria-label="Post lookup">
            <h1>Read Telegram posts without an account</h1>
            <p>
                Enter a public Telegram post URL to read its content. Posts are
                fetched via public proxies and cached locally for offline access.
            </p>
            <div class="link-input-group">
                <input
                    type="text"
                    id="homeLink"
                    placeholder="https://t.me/channel/123"
                />
                <button class="cta-button" id="goToReaderBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> Read</button>
            </div>
        </section>

        <div class="reader-shell" role="main" aria-label="Post reader">
                <div class="reader-container hidden">
                <div class="link-input-group">
                    <input
                        type="text"
                        id="telegramLink"
                        placeholder="https://t.me/channel/123"
                    />
                    <button id="loadButton" class="primary-button">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        Read
                    </button>
                </div>
                <div id="postDisplay" class="post-content">
                    <button
                        id="edgePrevZone"
                        class="article-edge-nav article-edge-nav--left"
                        type="button"
                        aria-label="Open previous post"
                    ><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg></button>
                    <button
                        id="edgeNextZone"
                        class="article-edge-nav article-edge-nav--right"
                        type="button"
                        aria-label="Open next post"
                    ><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg></button>
                    <div class="post-header-row">
                        <div id="postMeta" class="post-meta"></div>
                        <select id="textSizeSelect" class="text-size-select" aria-label="Text size">
                            <option value="small">S</option>
                            <option value="medium">M</option>
                            <option value="large">L</option>
                        </select>
                    </div>
                    <div id="postBody">
                        <p>
                            Enter a Telegram link above and click "Load Post" to
                            see the content.
                        </p>
                    </div>
                    <div id="postFooter" class="post-footer"></div>
                </div>
                <div
                    id="loadingOverlay"
                    class="loading-overlay"
                    aria-live="polite"
                >
                    <div class="skeleton-post" aria-hidden="true">
                        <div class="skeleton-line skeleton-line--title"></div>
                        <div class="skeleton-line skeleton-line--meta"></div>
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line skeleton-line--short"></div>
                        <div class="skeleton-line skeleton-line--gap"></div>
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line skeleton-line--short2"></div>
                    </div>
                    <p id="loaderMessage" class="sr-only">Loading…</p>
                    <p id="fallbackCountdown" class="sr-only"></p>
                </div>
                <div
                    id="errorMessage"
                    class="error-message"
                    aria-live="polite"
                    style="display: none"
                ></div>
            </div>
            <div class="floating-controls" aria-label="Post navigation">
                <div class="floating-nav-inner">
                    <button id="firstPostBtn" class="nav-btn" type="button" aria-label="Go to first post">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="11 17 6 12 11 7"/><polyline points="18 17 13 12 18 7"/></svg>
                        <span>First</span>
                    </button>
                    <button id="prevPostBtn" class="nav-btn" type="button" aria-label="Go to previous post">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
                        <span>Previous</span>
                    </button>
                    <button id="nextPostBtn" class="nav-btn" type="button" aria-label="Go to next post">
                        <span>Next</span>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
                    </button>
                </div>
            </div>
        </div>
        <footer></footer>
    </body>
</html>
