<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>tg-reader</title>
        <link rel="manifest" href="manifest.json" />
        <link rel="stylesheet" href="styles.css" />
        <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self'; connect-src https://api.codetabs.com https://api.allorigins.win https://thingproxy.freeboard.io; img-src https: data:; media-src https:; worker-src 'self'; manifest-src 'self'; base-uri 'self'; form-action 'none';">
        <link rel="preconnect" href="https://api.codetabs.com">
        <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
        <meta name="theme-color" content="#111118" media="(prefers-color-scheme: dark)">
        <script src="js/theme-init.js"></script>
        <link rel="modulepreload" href="js/state.js">
        <link rel="modulepreload" href="js/sources/telegram.js">
        <script type="module" src="js/main.js"></script>
    </head>
    <body>
        <header>
            <div class="header-shell">
                <a class="header-link" id="headerLink" href="/">tg-reader</a>
                <div class="header-actions">
                    <div class="mode-pill hidden" id="modePill" role="group" aria-label="Reading mode">
                        <button class="mode-pill-btn" id="modeDefaultBtn" type="button" aria-pressed="true">Default</button>
                        <button class="mode-pill-btn" id="modeMinimalBtn" type="button" aria-pressed="false">Minimal</button>
                    </div>
                    <div class="theme-pill" role="group" aria-label="Choose theme">
                        <button class="theme-pill-btn" id="themeLightBtn" type="button" aria-label="Light theme" aria-pressed="false">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
                        </button>
                        <button class="theme-pill-btn" id="themeDarkBtn" type="button" aria-label="Dark theme" aria-pressed="false">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                        </button>
                        <button class="theme-pill-btn" id="themeAutoBtn" type="button" aria-label="System theme" aria-pressed="false">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                        </button>
                    </div>
                    <!-- Mobile cycle buttons (visible < 743px only) -->
                    <button class="cycle-btn mode-cycle-btn hidden" id="modeCycleBtn" type="button" aria-label="Reading mode: default" data-mode="default">
                        <span class="cycle-btn-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg></span>
                        <div class="cycle-pips" aria-hidden="true">
                            <span class="pip"></span>
                            <span class="pip"></span>
                        </div>
                    </button>
                    <button class="cycle-btn theme-cycle-btn" id="themeCycleBtn" type="button" aria-label="Theme: auto" data-theme="auto">
                        <span class="cycle-btn-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></span>
                        <div class="cycle-pips" aria-hidden="true">
                            <span class="pip"></span>
                            <span class="pip"></span>
                            <span class="pip"></span>
                        </div>
                    </button>
                    <button class="user-menu-btn" id="userMenuBtn" type="button" aria-label="User menu">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </button>
                </div>
            </div>
        </header>
        <section class="hero" aria-label="Post lookup">
            <h1>Read posts without an account</h1>
            <p>
                Enter a public Telegram post or Mailchimp newsletter URL to read
                its content. Posts are fetched via public proxies and cached
                locally for offline access.
            </p>
            <form class="link-input-group" id="heroForm">
                <input
                    type="text"
                    id="homeLink"
                    placeholder="https://t.me/channel/123 or mailchi.mp/..."
                    aria-label="Post URL"
                />
                <button type="submit" class="cta-button" id="goToReaderBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> Read</button>
            </form>
        </section>

        <div class="reader-shell" role="main" aria-label="Post reader">
                <div class="reader-container hidden">
                <form class="link-input-group" id="readerForm">
                    <input
                        type="text"
                        id="telegramLink"
                        placeholder="https://t.me/channel/123 or mailchi.mp/..."
                        aria-label="Post URL"
                    />
                    <button type="submit" id="loadButton" class="primary-button">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        Read
                    </button>
                </form>
                <div id="postDisplay" class="post-content">
                    <button
                        id="edgePrevZone"
                        class="article-edge-nav article-edge-nav--left"
                        type="button"
                        aria-label="Open previous post"
                    ><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg></button>
                    <button
                        id="edgeNextZone"
                        class="article-edge-nav article-edge-nav--right"
                        type="button"
                        aria-label="Open next post"
                    ><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg></button>
                    <div id="postMeta" class="post-meta"></div>
                    <div id="postBody">
                        <p>
                            Enter a link above and click "Read" to
                            see the content.
                        </p>
                    </div>
                    <div id="postFooter" class="post-footer"></div>
                    <div
                        id="loadingOverlay"
                        class="loading-overlay"
                        aria-live="polite"
                    >
                        <div class="skeleton-post" aria-hidden="true">
                            <div class="skeleton-line skeleton-line--title"></div>
                            <div class="skeleton-line skeleton-line--meta"></div>
                            <div class="skeleton-line skeleton-line--body"></div>
                            <div class="skeleton-line skeleton-line--body"></div>
                            <div class="skeleton-line skeleton-line--body skeleton-line--short"></div>
                            <div class="skeleton-line skeleton-line--body skeleton-line--gap"></div>
                            <div class="skeleton-line skeleton-line--body skeleton-line--short2"></div>
                            <div class="skeleton-footer">
                                <div class="skeleton-line skeleton-line--link"></div>
                                <div class="skeleton-line skeleton-line--link"></div>
                                <div class="skeleton-line skeleton-line--link"></div>
                            </div>
                        </div>
                        <p id="loaderMessage" class="sr-only">Loading…</p>
                        <p id="fallbackCountdown" class="sr-only"></p>
                    </div>
                </div>
                <div
                    id="errorMessage"
                    class="error-message"
                    aria-live="polite"
                    style="display: none"
                ></div>
            </div>
        </div>
        <footer></footer>
    </body>
</html>
